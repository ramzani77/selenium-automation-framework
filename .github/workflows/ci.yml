name: Selenium CI with Docker Grid

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-



      - name: Start Selenium Grid
        run: |
          docker compose up -d
          echo "Waiting for Grid to be ready..."

      - name: Wait for Selenium Grid
        run: |
          echo "Waiting for Selenium Grid..."
          for i in {1..10}; do
            curl -s http://localhost:4444/status | grep ready && break
            echo "Grid not ready yet..."
            sleep 5
          done

      - name: Check running containers
        run: docker ps

      - name: Run Tests
        run: mvn clean test || true

      - name: Install Allure
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip
          wget https://github.com/allure-framework/allure2/releases/download/2.29.0/allure-2.29.0.zip
          unzip allure-2.29.0.zip
          sudo mv allure-2.29.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/bin/allure

      - name: Generate Allure Report
        run: |
          echo "Checking test results..."
          ls -R target || true

          echo "Checking allure-results..."
          ls -R target/allure-results || true

          echo "Generating Allure report..."
          allure generate target/allure-results --clean -o allure-report

          echo "Checking generated report..."
          ls -R allure-report

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: target/allure-results

      - name: Deploy Allure Report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report

      - name: Stop Grid
        if: always()
        run: docker compose down