name: Selenium CI with Docker Grid

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      # ✅ Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # ✅ Setup Java
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ✅ Cache Maven dependencies (faster build)
      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # ✅ Start Selenium Grid
      - name: Start Selenium Grid
        run: |
          docker compose up -d

      # ✅ Wait for Grid to be ready (better than sleep)
      - name: Wait for Selenium Grid
        run: |
          echo "Waiting for Selenium Grid..."
          for i in {1..10}; do
            curl -s http://localhost:4444/status | grep ready && break
            echo "Grid not ready yet..."
            sleep 5
          done

      # ✅ Debug containers
      - name: Check running containers
        run: docker ps

      # ✅ Run Tests (do not fail pipeline)
      - name: Run Tests
        run: mvn clean test || true

      # ✅ Install Allure
      - name: Install Allure
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip
          wget https://github.com/allure-framework/allure2/releases/download/2.29.0/allure-2.29.0.zip
          unzip allure-2.29.0.zip
          sudo mv allure-2.29.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/bin/allure

      # ✅ Generate Allure Report
      - name: Generate Allure Report
        run: |
          echo "Checking test results..."
          ls -R target || true

          echo "Checking allure-results..."
          ls -R target/allure-results || true

          echo "Generating Allure report..."
          allure generate target/allure-results --clean -o allure-report

      # ✅ Upload raw results
      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: target/allure-results

      # ✅ Generate Summary (VERY IMPORTANT)
      - name: Generate Test Summary
        if: always()
        run: |
          TOTAL=$(grep -r "\"status\"" target/allure-results | wc -l)
          FAILED=$(grep -r "\"status\":\"failed\"" target/allure-results | wc -l)
          PASSED=$(grep -r "\"status\":\"passed\"" target/allure-results | wc -l)

          echo "TOTAL=$TOTAL" >> $GITHUB_ENV
          echo "FAILED=$FAILED" >> $GITHUB_ENV
          echo "PASSED=$PASSED" >> $GITHUB_ENV

      # ✅ Deploy report to GitHub Pages
      - name: Deploy Allure Report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report

      # ✅ Comment PR with results
      - name: Comment PR with Results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const total = process.env.TOTAL;
            const passed = process.env.PASSED;
            const failed = process.env.FAILED;

            const reportUrl = `https://${context.repo.owner}.github.io/${context.repo.repo}/`;

            const body = `
            ✅ **Test Execution Summary**

            🔹 Total: ${total}  
            🔹 Passed: ${passed}  
            🔹 Failed: ${failed}  

            📊 [View Allure Report](${reportUrl})
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      # ✅ Stop Grid
      - name: Stop Grid
        if: always()
        run: docker compose down